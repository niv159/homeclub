<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Club — Homeschool Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Andika:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink-50:#fff0f5;--pink-100:#fdd8e8;--pink-200:#f9a8cc;--pink-400:#e8649a;--pink-600:#b83d70;
  --green-50:#f0faf3;--green-100:#d3f0db;--green-200:#a8ddb5;--green-400:#5cb87a;--green-600:#3a8a54;
  --bg:#fdf6f9;
}
body{font-family:'Andika',sans-serif;background:var(--bg);min-height:100vh;font-size:15px}
h1,h2,h3,.fredoka{font-family:'Fredoka',sans-serif}
.app{padding:1.5rem;max-width:1200px;margin:0 auto}
.topbar{background:var(--pink-50);border:1.5px solid var(--pink-200);border-radius:18px;padding:1rem 1.4rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo-blob{width:48px;height:48px;border-radius:14px;background:var(--pink-400);display:flex;align-items:center;justify-content:center;font-size:25px;flex-shrink:0}
.topbar h1{font-size:24px;font-weight:600;color:var(--pink-600);font-family:'Fredoka',sans-serif}
.topbar p{font-size:13px;color:var(--pink-400);margin-top:1px}
.btn{font-family:'Andika',sans-serif;background:#fff;border:1.5px solid var(--pink-200);border-radius:20px;padding:8px 17px;font-size:14px;cursor:pointer;color:var(--pink-600);display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:var(--pink-50);border-color:var(--pink-400)}
.btn-green{background:var(--green-50);border-color:var(--green-200);color:var(--green-600)}
.btn-green:hover{background:var(--green-100);border-color:var(--green-400)}
.btn-primary{background:var(--pink-400);color:#fff;border-color:var(--pink-400);font-weight:500}
.btn-primary:hover{background:var(--pink-600);border-color:var(--pink-600)}
.btn-sm{padding:6px 13px;font-size:13px}
.domains-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.domain-tab{padding:8px 17px;border-radius:22px;font-size:14px;cursor:pointer;border:1.5px solid var(--pink-100);background:#fff;color:#888;transition:all .15s;display:flex;align-items:center;gap:7px;font-family:'Andika',sans-serif}
.domain-tab:hover{border-color:var(--pink-200);background:var(--pink-50)}
.domain-tab.active{border-color:var(--pink-400);background:var(--pink-50);color:var(--pink-600);font-weight:700}
.domain-tab .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card{background:#fff;border:1.5px solid var(--pink-100);border-radius:18px;overflow:hidden;margin-bottom:1rem}
.domain-header{padding:1.1rem 1.4rem;background:var(--pink-50);border-bottom:1.5px solid var(--pink-100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.domain-icon-wrap{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:23px;border:1.5px solid var(--pink-200);background:#fff;flex-shrink:0}
.domain-title{font-size:18px;font-weight:600;color:var(--pink-600);font-family:'Fredoka',sans-serif}
.domain-subtitle{font-size:13px;color:var(--pink-400);margin-top:2px}
.progress-bar{height:7px;background:var(--pink-100);border-radius:6px;overflow:hidden;margin-top:5px;width:115px}
.progress-fill{height:100%;border-radius:6px;background:var(--green-400);transition:width .5s}
.progress-label{font-size:12px;color:var(--green-600)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:1.1rem 1.4rem;border-bottom:1.5px solid var(--pink-100)}
.stat-box{border-radius:14px;padding:.8rem 1rem;text-align:center}
.stat-box .num{font-size:25px;font-weight:600;font-family:'Fredoka',sans-serif}
.stat-box .lbl{font-size:12px;margin-top:3px}
.stat-done{background:var(--green-50)}.stat-done .num{color:var(--green-600)}.stat-done .lbl{color:var(--green-400)}
.stat-prog{background:#fffbea}.stat-prog .num{color:#c0860a}.stat-prog .lbl{color:#c0860a}
.stat-idle{background:var(--pink-50)}.stat-idle .num{color:var(--pink-400)}.stat-idle .lbl{color:var(--pink-400)}
.ages-row{display:flex;gap:6px;flex-wrap:wrap;padding:.8rem 1.4rem .3rem}
.age-chip{padding:5px 14px;border-radius:14px;font-size:13px;cursor:pointer;border:1.5px solid var(--pink-100);background:#fff;color:#999;font-family:'Andika',sans-serif;transition:all .15s}
.age-chip:hover{border-color:var(--pink-200);background:var(--pink-50)}
.age-chip.active{background:var(--green-400);border-color:var(--green-400);color:#fff;font-weight:700}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:10px 13px;text-align:left;font-family:'Fredoka',sans-serif;font-size:14px;font-weight:500;color:var(--pink-600);border-bottom:1.5px solid var(--pink-100);background:var(--pink-50)}
td{padding:11px 13px;border-bottom:1px solid var(--pink-50);vertical-align:top;color:#444;font-family:'Andika',sans-serif}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fffafb}
.age-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;font-family:'Fredoka',sans-serif;white-space:nowrap}
.concept-badge{display:inline-block;padding:3px 10px;border-radius:9px;font-size:12px;font-family:'Andika',sans-serif;line-height:1.5;white-space:normal;word-break:break-word}
.milestone-text{font-size:14px;line-height:1.6;color:#333}
.level-tag{font-size:12px;color:#aaa;margin-top:4px}
.check-wrap{text-align:center}
.check-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--pink-200);background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;color:#ccc;font-size:15px}
.check-btn:hover{border-color:var(--green-400);color:var(--green-400)}
.check-btn.done{background:var(--green-400);border-color:var(--green-400);color:#fff}
.check-btn.in-progress{background:#f9c74f;border-color:#f9c74f;color:#fff}
.note-input{width:100%;background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:10px;padding:7px 10px;font-size:13px;color:#444;font-family:'Andika',sans-serif;resize:none;min-height:36px;height:auto;line-height:1.55;overflow:hidden;white-space:pre-wrap;word-break:break-word;transition:border .15s,background .15s}
.note-input:focus{outline:none;border-color:var(--pink-400);background:#fff}
.modal-overlay{position:fixed;inset:0;background:rgba(180,80,120,.22);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:20px;border:2px solid var(--pink-100);width:460px;max-width:calc(100% - 2rem);padding:1.6rem;max-height:90vh;overflow-y:auto}
.modal h2{font-size:20px;font-weight:600;color:var(--pink-600);margin-bottom:3px;font-family:'Fredoka',sans-serif}
.modal .sub{font-size:14px;color:#aaa;margin-bottom:1.3rem}
.form-row{margin-bottom:1.1rem}
.form-row label{display:block;font-size:13px;font-weight:700;color:var(--pink-400);margin-bottom:5px;font-family:'Fredoka',sans-serif}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:12px;padding:10px 13px;font-size:14px;color:#333;font-family:'Andika',sans-serif;transition:border .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--pink-400);background:#fff}
.form-row textarea{resize:none;min-height:78px}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.3rem;flex-wrap:wrap}
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:6px}
.icon-opt{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--pink-100);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;transition:all .15s}
.icon-opt:hover{border-color:var(--pink-400);background:var(--pink-50)}
.icon-opt.selected{border-color:var(--pink-400);background:var(--pink-50)}
.color-dot{width:27px;height:27px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border .15s}
.color-dot.sel{border-color:#555}
.empty-state{padding:3rem;text-align:center;color:var(--pink-400)}
.empty-state i{font-size:42px;margin-bottom:.75rem;display:block;opacity:.4}
.empty-state .etitle{font-size:18px;font-family:'Fredoka',sans-serif;font-weight:600;margin-bottom:6px;color:var(--pink-600)}
.save-toast{position:fixed;bottom:20px;right:20px;background:var(--green-400);color:#fff;font-family:'Fredoka',sans-serif;font-size:15px;padding:9px 20px;border-radius:14px;opacity:0;transition:opacity .3s;z-index:2000;pointer-events:none}
.save-toast.show{opacity:1}
.danger-btn{color:#d44;border-color:#fcc}
.danger-btn:hover{background:#fff5f5;border-color:#f99}
.login-screen{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:1.5rem;z-index:3000}
.login-card{background:#fff;border:2px solid var(--pink-100);border-radius:24px;padding:2.2rem 2rem;width:420px;max-width:100%;text-align:center;box-shadow:0 12px 44px rgba(184,61,112,.10)}
.login-logo{width:64px;height:64px;border-radius:18px;background:var(--pink-400);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto .9rem}
.login-card h1{font-size:28px;color:var(--pink-600);font-family:'Fredoka',sans-serif;font-weight:600;margin-bottom:1.4rem}
.login-sub{font-size:15px;color:var(--pink-400);margin-top:2px;margin-bottom:1.4rem}
.login-users{display:flex;flex-direction:column;gap:8px;margin-bottom:.4rem}
.login-user-chip{display:flex;align-items:center;justify-content:space-between;background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:14px;padding:11px 16px;transition:all .15s}
.login-user-chip:hover{border-color:var(--pink-400);background:#fff}
.login-user-chip .uname{flex:1;text-align:left;cursor:pointer;font-size:16px;color:var(--pink-600);font-family:'Fredoka',sans-serif}
.login-user-chip i{color:var(--pink-200);cursor:pointer;font-size:16px;padding:4px;border-radius:8px}
.login-user-chip i:hover{color:#d44;background:#fff5f5}
.login-divider{display:flex;align-items:center;gap:10px;color:#bbb;font-size:13px;margin:1rem 0;font-family:'Andika',sans-serif}
.login-divider:before,.login-divider:after{content:'';flex:1;height:1px;background:var(--pink-100)}
.login-form{display:flex;gap:8px}
.login-fields{display:flex;flex-direction:column;gap:8px}
.login-fields input{background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:14px;padding:12px 15px;font-size:15px;font-family:'Andika',sans-serif;color:#333}
.login-fields input:focus{outline:none;border-color:var(--pink-400);background:#fff}
.login-fields .btn-primary{justify-content:center;padding:12px;font-size:15px}
.login-error{font-size:13px;color:#d44;margin-top:.7rem;min-height:1em;font-family:'Andika',sans-serif}
.login-form input{flex:1;background:var(--pink-50);border:1.5px solid var(--pink-100);border-radius:14px;padding:12px 15px;font-size:15px;font-family:'Andika',sans-serif;color:#333}
.login-form input:focus{outline:none;border-color:var(--pink-400);background:#fff}
.login-form .btn-primary{white-space:nowrap}
.login-note{font-size:12px;color:#bbb;margin-top:1rem;font-family:'Andika',sans-serif;line-height:1.5}
.user-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-50);border:1.5px solid var(--green-200);color:var(--green-600);border-radius:20px;padding:7px 14px;font-size:14px;font-family:'Fredoka',sans-serif}
.user-badge:empty{display:none}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
.theme-opt{display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 6px;border-radius:14px;border:1.5px solid var(--pink-100);cursor:pointer;transition:all .15s}
.theme-opt:hover{border-color:var(--pink-400);background:var(--pink-50)}
.theme-opt.sel{border-color:var(--pink-400);background:var(--pink-50);box-shadow:0 0 0 2px var(--pink-200) inset}
.theme-swatch{width:34px;height:34px;border-radius:50%;border:2px solid rgba(0,0,0,.06)}
.theme-name{font-size:13px;color:var(--pink-600);font-family:'Fredoka',sans-serif}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen"></div>
<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-blob">🌱</div>
      <div>
        <h1>Home Club</h1>
        <p>Homeschool milestone tracker · Ages 0–5</p>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span class="user-badge" id="userBadge"></span>
      <button class="btn btn-sm" onclick="switchUser()" title="Switch to a different person"><i class="ti ti-switch-horizontal"></i> Switch</button>
      <button class="btn btn-sm" onclick="openThemePicker()" title="Change colour theme"><i class="ti ti-palette"></i> Theme</button>
      <button class="btn btn-sm btn-green" onclick="exportJSON()" title="Download a backup of this tracker"><i class="ti ti-download"></i> Export</button>
      <button class="btn btn-sm" onclick="document.getElementById('importFile').click()" title="Restore from a backup file"><i class="ti ti-upload"></i> Import</button>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importJSON(event)" />
      <button class="btn btn-primary" onclick="openAddDomain()"><i class="ti ti-plus"></i> Add domain</button>
    </div>
  </div>
  <div class="domains-nav" id="domainsNav"></div>
  <div id="mainContent"></div>
  <div id="modalMount"></div>
  <div class="save-toast" id="toast">Saved! 🌿</div>
</div>
<script>
const COLORS=[
  {bg:'#fff0f5',border:'#f9a8cc',dot:'#e8649a',text:'#b83d70',name:'pink'},
  {bg:'#f0faf3',border:'#a8ddb5',dot:'#5cb87a',text:'#3a8a54',name:'green'},
  {bg:'#f5f0ff',border:'#c9b8f4',dot:'#9b7ee8',text:'#5e3db5',name:'lavender'},
  {bg:'#fff4ee',border:'#ffc8a0',dot:'#f4874b',text:'#b85520',name:'peach'},
  {bg:'#f0f8ff',border:'#aad4f5',dot:'#4eaaee',text:'#1a6aaa',name:'sky'},
  {bg:'#fffbea',border:'#f9d67a',dot:'#e8a720',text:'#a06a00',name:'yellow'},
];
const ICONS=['📐','🔢','🌍','🎨','🔬','📚','🎵','🏃','🌿','🧩','💬','⭐','🦋','🌈','🐝','🎭','🐣','🌸','🍎','🦊','🌻','🎯','🧸','🖍️'];
const AGE_BANDS=['0–1','1–2','2–3','3–4','4–5'];
const AGE_STYLE={'0–1':{bg:'#fff0f5',text:'#b83d70'},'1–2':{bg:'#fff4ee',text:'#b85520'},'2–3':{bg:'#f5f0ff',text:'#5e3db5'},'3–4':{bg:'#f0faf3',text:'#3a8a54'},'4–5':{bg:'#fffbea',text:'#a06a00'}};
/* ============================================================
   SUPABASE CONFIG — paste your project values between the quotes.
   Find them in Supabase → Project Settings → API.
   The anon key is safe to ship in client code; security comes
   from the Row Level Security policy on the `trackers` table.
   ============================================================ */

  const SUPABASE_URL='https://narhluwnyijxsrxwpqgo.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hcmhsdXdueWlqeHNyeHdwcWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTY0MzEsImV4cCI6MjA5NzY5MjQzMX0.poJJ4TodLySRHNJEMHNisTnrJ_Ht4tsgcn4nNn-wS_c';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let currentUser=null;   // display name
let currentUid=null;    // supabase auth user id
function slug(name){return String(name).trim().toLowerCase().replace(/[^a-z0-9]+/g,'.').replace(/^\.+|\.+$/g,'')||'user';}
function emailFor(name){return slug(name)+'@homeclub.app';}
function pwFor(name,pin){return 'hc::'+slug(name)+'::'+pin;}
function recentNames(){try{return JSON.parse(localStorage.getItem('homeclub_recent'))||[];}catch(e){return [];}}
function rememberName(n){let l=recentNames().filter(x=>x!==n);l.unshift(n);localStorage.setItem('homeclub_recent',JSON.stringify(l.slice(0,6)));}
function forgetNameIdx(i){const l=recentNames();l.splice(i,1);localStorage.setItem('homeclub_recent',JSON.stringify(l));showLogin();}
function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
const THEMES={
  pink:{label:'Blossom',v:{'--pink-50':'#fff0f5','--pink-100':'#fdd8e8','--pink-200':'#f9a8cc','--pink-400':'#e8649a','--pink-600':'#b83d70','--bg':'#fdf6f9'}},
  lavender:{label:'Lavender',v:{'--pink-50':'#f5f0ff','--pink-100':'#e4d8fa','--pink-200':'#c9b8f4','--pink-400':'#9b7ee8','--pink-600':'#5e3db5','--bg':'#f7f3fd'}},
  sky:{label:'Sky',v:{'--pink-50':'#f0f8ff','--pink-100':'#d6ecfb','--pink-200':'#aad4f5','--pink-400':'#4eaaee','--pink-600':'#1a6aaa','--bg':'#f3f9ff'}},
  peach:{label:'Peach',v:{'--pink-50':'#fff4ee','--pink-100':'#ffe2d1','--pink-200':'#ffc8a0','--pink-400':'#f4874b','--pink-600':'#b85520','--bg':'#fff7f2'}},
  teal:{label:'Teal',v:{'--pink-50':'#eefaf8','--pink-100':'#cdeee8','--pink-200':'#9bdbd0','--pink-400':'#34a899','--pink-600':'#1d7468','--bg':'#f1faf8'}},
  honey:{label:'Honey',v:{'--pink-50':'#fffbea','--pink-100':'#fdf0c4','--pink-200':'#f9d67a','--pink-400':'#e0991a','--pink-600':'#9c6a00','--bg':'#fffdf3'}},
};
let currentTheme='pink';
function applyTheme(key){
  if(!THEMES[key])key='pink';
  currentTheme=key;
  const root=document.documentElement.style;
  const v=THEMES[key].v;
  for(const k in v)root.setProperty(k,v[k]);
}
function setTheme(key){
  applyTheme(key);
  localStorage.setItem('homeclub_lastTheme',key);
  if(currentUid)saveState();
  openThemePicker();
}
function openThemePicker(){
  const swatches=Object.keys(THEMES).map(k=>{
    const t=THEMES[k];
    return `<div class="theme-opt${k===currentTheme?' sel':''}" onclick="setTheme('${k}')">
      <span class="theme-swatch" style="background:${t.v['--pink-400']}"></span>
      <span class="theme-name">${t.label}</span>
    </div>`;
  }).join('');
  document.getElementById('modalMount').innerHTML=`<div class="modal-overlay" onclick="closeIfOverlay(event)">
    <div class="modal">
      <h2>Choose a colour</h2>
      <div class="sub">Sets the background and accents for this person</div>
      <div class="theme-grid">${swatches}</div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="closeModal()">Done</button>
      </div>
    </div>
  </div>`;
}
let state={activeDomain:0,domains:[],ageFilter:'all'};
let nextId=200;
let saveTimer=null;

function mkrows(arr){return arr.map((r,i)=>({...r,id:'r'+i}));}

const MATH_ROWS=mkrows([
  {concept:'Counting & Cardinality',age:'0–1',milestone:'Chants random sounds and vocalizes rhythms',level:'Pre-Counter',status:'done',note:'Loves singing along!'},
  {concept:'Counting & Cardinality',age:'1–2',milestone:'Says random number words during open play',level:'Pre-Counter',status:'done',note:''},
  {concept:'Counting & Cardinality',age:'2–3',milestone:'Chants numbers 1 to 5 in the correct order',level:'Verbal Counter',status:'in-progress',note:'Getting there — tries every morning'},
  {concept:'Counting & Cardinality',age:'3–4',milestone:'Touches and counts up to 5 items accurately',level:'Object Counter',status:'',note:''},
  {concept:'Counting & Cardinality',age:'4–5',milestone:'Counts a messy pile up to 10 and states total',level:'Counter to 10',status:'',note:''},
  {concept:'Subitizing & Quantity',age:'0–1',milestone:'Notices a visual difference between 1 item and 2',level:'Pre-Subitizer',status:'done',note:''},
  {concept:'Subitizing & Quantity',age:'1–2',milestone:'Separates a single item from "lots"',level:'Small Collection Namer',status:'done',note:''},
  {concept:'Subitizing & Quantity',age:'2–3',milestone:'Recognises a pair (2 objects) instantly by sight',level:'Maker of Small Sets',status:'in-progress',note:''},

async function loadState(){
  try{
    const {data,error}=await sb.from('trackers').select('data').eq('user_id',currentUid).maybeSingle();
    const d=(!error&&data)?data.data:null;
    if(d&&d.domains&&d.domains.length){
      state.domains=d.domains;
      state.activeDomain=Math.min(d.activeDomain||0,d.domains.length-1);
      applyTheme(d.theme||localStorage.getItem('homeclub_lastTheme')||'pink');
    } else {
      state.domains=defaultDomains();
      applyTheme(localStorage.getItem('homeclub_lastTheme')||'pink');
      await persist();
    }
  } catch(e){
    state.domains=defaultDomains();
    applyTheme('pink');
  }
  render();
}

async function persist(){
  if(!currentUid)return;
  await sb.from('trackers').upsert({
    user_id:currentUid,
    data:{domains:state.domains,activeDomain:state.activeDomain,theme:currentTheme},
    updated_at:new Date().toISOString()
  });
}

function saveState(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    persist().then(()=>showToast('Saved! 🌿')).catch(()=>showToast('Save failed — check connection'));
  },600);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg||'Saved! 🌿';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function importJSON(ev){
  const file=ev.target.files&&ev.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const obj=JSON.parse(reader.result);
      if(!obj||!Array.isArray(obj.domains)||!obj.domains.length){throw new Error('bad');}
      if(!confirm('Replace the current tracker with the backup? This overwrites what is here now.')){ev.target.value='';return;}
      state.domains=obj.domains;
      state.activeDomain=Math.min(obj.activeDomain||0,obj.domains.length-1);
      if(obj.theme)applyTheme(obj.theme);
      render();saveState();
      showToast('Restored! 🌿');
    }catch(e){
      alert('That file does not look like a Home Club backup.');
    }
    ev.target.value='';
  };
  reader.readAsText(file);
}
function exportJSON(){
  const data={exportedAt:new Date().toISOString(),version:2,user:currentUser,domains:state.domains};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  const who=(currentUser||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'data';
  a.href=url;a.download='homeclub-'+who+'-'+date+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('Exported! 📦');
}

function conceptColorIdx(domainColorIdx,ci){return(domainColorIdx+ci+1)%COLORS.length;}
function computeStats(domain){
  const done=domain.rows.filter(r=>r.status==='done').length;
  const inprog=domain.rows.filter(r=>r.status==='in-progress').length;
  const total=domain.rows.length;
  return{done,inprog,total,pct:total?Math.round(done/total*100):0};
}

function cycleStatus(domainId,rowIdx){

  const p=document.getElementById('loginPin');if(p)p.focus();
}
function loginError(msg){const e=document.getElementById('loginError');if(e)e.textContent=msg||'';}
function loginBusy(on){
  const b=document.getElementById('loginBtn');if(!b)return;
  b.disabled=on;b.style.opacity=on?'.6':'1';
  b.innerHTML=on?'Signing in…':'Start <i class="ti ti-arrow-right"></i>';
}
async function submitLogin(){
  const name=(document.getElementById('loginName').value||'').trim();
  const pin=(document.getElementById('loginPin').value||'').trim();
  loginError('');
  if(!name){loginError('Please enter a name.');return;}
  if(!/^\d{4}$/.test(pin)){loginError('Enter a 4-digit code (numbers only).');return;}
  loginBusy(true);
  const email=emailFor(name), pw=pwFor(name,pin);
  try{
    // Existing account + correct code:
    let r=await sb.auth.signInWithPassword({email,password:pw});
    if(r.error){
      // Try creating a new account with this name+code:
      let s=await sb.auth.signUp({email,password:pw,options:{data:{name}}});
      if(s.error){loginBusy(false);loginError(s.error.message||'Could not sign in.');return;}
      if(!s.data.session){
        // No session => name already taken with a different code (or email confirm is on).
        let r2=await sb.auth.signInWithPassword({email,password:pw});
        if(r2.error){loginBusy(false);loginError('That name and code don’t match. Check the code, or pick a different name.');return;}
      }
    }
    rememberName(name);
    await enterApp(name);
  }catch(e){
    loginError('Connection problem. Please try again.');
  }
  loginBusy(false);
}
async function enterApp(name){
  currentUser=name;
  const {data:{user}}=await sb.auth.getUser();
  currentUid=user?user.id:null;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('userBadge').innerHTML='<i class="ti ti-user"></i> '+escHtml(name);
  await loadState();
}
async function switchUser(){
  await sb.auth.signOut();
  showLogin();
}
async function boot(){
  applyTheme(localStorage.getItem('homeclub_lastTheme')||'pink');
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    const name=(session.user.user_metadata&&session.user.user_metadata.name)||session.user.email.split('@')[0];
    await enterApp(name);
  } else {
    showLogin();
  }
}
boot();
</script>
